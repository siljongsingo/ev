  --blue:#185FA5;--blue-bg:#E6F1FB;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-weight:300;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
#root{height:100vh;display:flex;flex-direction:column}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C8C6BE;border-radius:3px}
input,button,select{font-family:var(--font);font-size:14px}
input::placeholder{color:#999;font-size:13px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline;opacity:.85}
.sbi:hover{background:rgba(255,255,255,.12)!important}
.sbr:hover{background:rgba(255,255,255,.08)!important}
.row:hover td{background:#FAFAF7!important}
.chip:hover{opacity:.8}
/* ── 관리자 테이블 ── */
.adm-tbl{width:100%;border-collapse:collapse;font-size:13px}
.adm-tbl th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;border-bottom:2px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:1}
.adm-tbl td{padding:8px 12px;border-bottom:1px solid #F2F1EC;vertical-align:top}
.adm-tbl tr:hover td{background:#FAFAF7}
.adm-inp{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:var(--font);outline:none;background:var(--card)}
.adm-inp:focus{border-color:var(--blue)}
/* ── 반응형 ── */
.mob-only{display:none!important}
@media(max-width:900px){
  .mob-only{display:flex!important;align-items:center}
  .desk-search{display:none!important}
  .sidebar-wrap{position:fixed;left:0;top:52px;bottom:0;z-index:300;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.35)}
  .sidebar-wrap.open{transform:translateX(0)}
  .cards-row{flex-wrap:wrap!important}
  .cards-row>div{min-width:calc(50% - 5px)!important}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
@media(max-width:520px){.cards-row>div{min-width:100%!important}}
</style>

function parseCSV(text) {
  const lines = text.replace(/\r/g, '').split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cells = [];
    let cur = '';
    let inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') {
        inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        cells.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }
    cells.push(cur.trim());
    if (cells[0]) rows.push({
      sido: cells[0] || '',
      sigungu: cells[1] || '',
      dept: cells[2] || '',
      phone: cells[3] || '',
      extra: (cells[4] || '').replace(/^"|"$/g, '')
    });
  }
  return rows;
}

async function fetchSubsidy(region, apiKey) {
  const yr = new Date().getFullYear();
  // 프롬프트 최소화 (토큰 절약)
  const prompt = `"${region}" ${yr}년 전기차 보조금을 ev.or.kr에서 검색. JSON만 반환:
{"passenger":{"national":N,"city":N,"district":N,"corp":N,"total":N,"quota":N,"remaining":N,"status":"접수중|마감|대기|미정","queue":0,"period":"MM.DD~MM.DD","note":""},"truck":{"national":N,"city":N,"district":N,"corp":N,"total":N,"quota":N,"remaining":N,"status":"미정","queue":0,"period":null,"note":""},"contacts":[{"dept":"","phone":""}],"official_url":"","sources":[],"notice":""}
숫자는 만원 단위 정수, 모르면 null`;

  const call = async () => {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 600,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error("API 키가 올바르지 않습니다.");
      if (res.status === 429) {
        const retry = parseInt(res.headers.get("retry-after") || "15");
        throw Object.assign(new Error(`rate_limit`), { retryAfter: retry });
      }
      throw new Error(e?.error?.message || `오류 (${res.status})`);
    }
    const d = await res.json();
    const txt = (d.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const m = txt.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch (_) {} }
    throw new Error("파싱 실패 — 다시 시도해 주세요");
  };

  // 429 시 최대 2회 재시도
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      return await call();
    } catch (e) {
      if (e.message === "rate_limit" && attempt < 2) {
        const wait = (e.retryAfter || 15) * 1000;
        await new Promise(r => setTimeout(r, wait));
        continue;
      }

      throw e;
    }
  }
}
